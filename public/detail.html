<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>详情 - 影视</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <header id="header"></header>
  <main id="app"><div class="loading">加载中...</div></main>

  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest/dist/hls.min.js"></script>
  <script src="/common.js"></script>
  <script>
    var params = new URLSearchParams(location.search);
    var id = params.get('id');
    var _episodes = [];
    var _hls = null;
    var _currentEpIdx = -1;
    var _saveTimer = null;

    // localStorage key
    var PROGRESS_KEY = 'progress_' + id;   // { epIdx, time }
    var LAST_EP_KEY  = 'lastep_' + id;     // epIdx

    function loadProgress() {
      try { return JSON.parse(localStorage.getItem(PROGRESS_KEY)) || {}; } catch(e) { return {}; }
    }
    function saveProgress(epIdx, time) {
      try { localStorage.setItem(PROGRESS_KEY, JSON.stringify({ epIdx: epIdx, time: time })); } catch(e) {}
    }
    function saveLastEp(epIdx) {
      try { localStorage.setItem(LAST_EP_KEY, epIdx); } catch(e) {}
    }
    function getLastEp() {
      var v = localStorage.getItem(LAST_EP_KEY);
      return v !== null ? parseInt(v) : -1;
    }

    renderHeader(null);

    if (!id) {
      document.getElementById('app').innerHTML = '<div class="loading">缺少参数</div>';
    } else {
      fetch('/api/detail?id=' + id)
        .then(function(r) { return r.json(); })
        .then(function(d) {
          document.title = d.title + ' - 影视';
          // 剧集倒序：最新在前
          _episodes = (d.episodes || []).slice().reverse();

          var coverEl = d.cover
            ? '<img class="detail-cover" src="' + d.cover + '" onerror="this.style.display=\'none\'" alt="">'
            : '<div class="detail-cover-placeholder">🎬</div>';

          var epCount = _episodes.length;
          var progress = loadProgress();
          var lastEp = progress.epIdx !== undefined ? progress.epIdx : getLastEp();

          var epBtns = _episodes.map(function(ep, i) {
            var isLast = (i === lastEp);
            var cls = 'ep-btn' + (isLast ? ' last-watched' : '');
            var label = ep.title + (isLast ? ' ▶' : '');
            return '<button class="' + cls + '" id="ep_' + i + '" onclick="playEp(' + i + ')">' + label + '</button>';
          }).join('');

          var epSection = epCount > 0
            ? '<div class="episodes-title">播放列表（' + epCount + (epCount === 1 ? '部' : '集') + '）'
              + (lastEp >= 0 ? '<span class="last-ep-hint">上次看到：' + (_episodes[lastEp] && _episodes[lastEp].title) + '</span>' : '')
              + '</div><div class="episodes" id="epList">' + epBtns + '</div>'
            : '';

          var html =
            '<div class="player-wrap" id="playerWrap">'
            + '<video id="videoEl" controls playsinline></video>'
            + '</div>'
            + '<div id="playerMsg" class="player-msg">点击下方集数开始播放</div>'
            + epSection
            + '<div class="detail-header">' + coverEl
            + '<div class="detail-meta"><h1>' + d.title + '</h1>'
            + (d.score ? '<span class="detail-score">' + d.score + '</span>' : '')
            + '<p class="detail-desc">' + (d.desc || '暂无简介') + '</p>'
            + '</div></div>';

          document.getElementById('app').innerHTML = html;

          // 滚动到上次看的集数按钮，或默认加载第一集
          if (lastEp >= 0) {
            var lastBtn = document.getElementById('ep_' + lastEp);
            if (lastBtn) lastBtn.scrollIntoView({ block: 'nearest', inline: 'center' });
            playEp(lastEp, true);
          } else if (_episodes.length > 0) {
            // 没有记录，加载原始第一集（倒序后是最后一个）
            playEp(_episodes.length - 1, true);
          }
        }).catch(function(e) {
          document.getElementById('app').innerHTML = '<div class="loading">加载失败：' + e.message + '</div>';
        });
    }

    function playEp(idx, pauseAfterLoad) {
      var ep = _episodes[idx];
      if (!ep) return;

      _currentEpIdx = idx;
      saveLastEp(idx);

      // 更新按钮状态
      document.querySelectorAll('.ep-btn').forEach(function(b) {
        b.classList.remove('active', 'last-watched');
        // 还原标题（去掉 ▶）
        b.textContent = b.textContent.replace(' ▶', '');
      });
      var btn = document.getElementById('ep_' + idx);
      if (btn) {
        btn.classList.add('active');
        btn.scrollIntoView({ block: 'nearest', inline: 'center' });
      }

      var msg = document.getElementById('playerMsg');
      if (msg) msg.textContent = '加载视频源...';

      var playPath = ep.url.replace('https://www.olehdtv.com', '');
      fetch('/api/video-src?path=' + encodeURIComponent(playPath))
        .then(function(r) { return r.json(); })
        .then(function(data) {
          if (data.error || !data.src) {
            if (msg) msg.textContent = '无法获取视频源';
            return;
          }
          if (msg) msg.textContent = '';
          var progress = loadProgress();
          var resumeTime = (progress.epIdx === idx && progress.time > 5) ? progress.time : 0;
          loadVideo(data.src, resumeTime, pauseAfterLoad);
        }).catch(function(e) {
          if (msg) msg.textContent = '加载失败：' + e.message;
        });
    }

    function loadVideo(src, resumeTime, pauseAfterLoad) {
      var video = document.getElementById('videoEl');
      if (!video) return;
      if (_hls) { _hls.destroy(); _hls = null; }

      // 清除旧的进度保存定时器
      if (_saveTimer) clearInterval(_saveTimer);

      function onReady() {
        if (resumeTime > 0) {
          video.currentTime = resumeTime;
          var msg = document.getElementById('playerMsg');
          if (msg) msg.textContent = '上次看到 ' + formatTime(resumeTime) + '，点击播放继续';
        }
        if (!pauseAfterLoad) {
          video.play();
        }
        // 每5秒保存一次进度
        _saveTimer = setInterval(function() {
          if (!video.paused && video.currentTime > 5) {
            saveProgress(_currentEpIdx, video.currentTime);
          }
        }, 5000);
      }

      if (src.includes('.m3u8') && typeof Hls !== 'undefined' && Hls.isSupported()) {
        _hls = new Hls();
        _hls.loadSource(src);
        _hls.attachMedia(video);
        _hls.on(Hls.Events.MANIFEST_PARSED, onReady);
      } else {
        video.src = src;
        video.addEventListener('canplay', onReady, { once: true });
      }

      // 页面关闭/跳转时也保存
      window.addEventListener('beforeunload', function() {
        if (video.currentTime > 5) saveProgress(_currentEpIdx, video.currentTime);
      });
    }

    function formatTime(s) {
      s = Math.floor(s);
      var h = Math.floor(s / 3600);
      var m = Math.floor((s % 3600) / 60);
      var sec = s % 60;
      if (h > 0) return h + ':' + pad(m) + ':' + pad(sec);
      return pad(m) + ':' + pad(sec);
    }
    function pad(n) { return n < 10 ? '0' + n : '' + n; }
  </script>
</body>
</html>
