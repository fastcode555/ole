name: Build & Release

# 触发方式：
#   1. 推 tag (v*) - 自动构建三平台并发布到 Releases 页面
#   2. workflow_dispatch - 在 Actions 页手动跑，自己指定 tag
on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: '版本号（如 v0.1.0）'
        required: true
        default: 'v0.1.0'

permissions:
  contents: write

env:
  # 不锁具体版本，跟 stable 通道走最新稳定版。
  # 之前锁 3.27.2 → media_kit_video 2.0.1 用了新的 SurfaceProducer.Callback API
  # （onSurfaceAvailable / onSurfaceCleanup），3.27.2 Android engine 还是旧名，Java 编译挂掉。
  PROJECT_PATH: 'ole_flutter'

jobs:
  windows:
    name: Build Windows
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Pub get
        working-directory: ${{ env.PROJECT_PATH }}
        run: flutter pub get

      - name: Build
        working-directory: ${{ env.PROJECT_PATH }}
        run: flutter build windows --release

      - name: Resolve version
        id: ver
        shell: pwsh
        run: |
          if ($env:GITHUB_REF -like 'refs/tags/v*') {
            $v = $env:GITHUB_REF -replace 'refs/tags/v',''
          } else {
            $v = '${{ inputs.tag }}' -replace '^v',''
          }
          if (-not $v) { $v = '1.0.0' }
          "version=$v" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Compile installer (Inno Setup)
        shell: pwsh
        # windows-latest 预装了 Inno Setup 6 在 C:\Program Files (x86)\Inno Setup 6\
        # /D 传宏定义到脚本里
        run: |
          $iscc = 'C:\Program Files (x86)\Inno Setup 6\ISCC.exe'
          if (-not (Test-Path $iscc)) {
            choco install innosetup -y --no-progress
          }
          & $iscc `
            /DBuildDir="$env:GITHUB_WORKSPACE\${{ env.PROJECT_PATH }}\build\windows\x64\runner\Release" `
            /DOutDir="$env:GITHUB_WORKSPACE" `
            /DAppVersion="${{ steps.ver.outputs.version }}" `
            "${{ env.PROJECT_PATH }}\windows\installer.iss"

      - uses: actions/upload-artifact@v4
        with:
          name: windows
          path: ole_flutter-windows-setup.exe
          if-no-files-found: error
          retention-days: 7

  macos:
    name: Build macOS
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Pub get
        working-directory: ${{ env.PROJECT_PATH }}
        run: flutter pub get

      - name: Build
        working-directory: ${{ env.PROJECT_PATH }}
        run: flutter build macos --release

      - name: Package DMG
        # hdiutil 是 macOS 自带工具，做 UDZO 压缩只读 DMG。用户双击 .dmg 即可挂载，
        # 拖 .app 到 Applications 文件夹完成安装。
        working-directory: ${{ env.PROJECT_PATH }}/build/macos/Build/Products/Release
        run: |
          APP=$(ls -d *.app | head -1)
          # 建立一个临时目录放 .app + Applications 软链接，做出"拖拽安装"的视觉效果
          STAGE=$(mktemp -d)
          cp -R "$APP" "$STAGE/"
          ln -s /Applications "$STAGE/Applications"
          hdiutil create \
            -volname "OLE 影视" \
            -srcfolder "$STAGE" \
            -ov -format UDZO \
            "$GITHUB_WORKSPACE/ole_flutter-macos.dmg"

      - uses: actions/upload-artifact@v4
        with:
          name: macos
          path: ole_flutter-macos.dmg
          if-no-files-found: error
          retention-days: 7

  android:
    name: Build Android APK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Pub get
        working-directory: ${{ env.PROJECT_PATH }}
        run: flutter pub get

      - name: Build APK
        # 当前 android/app/build.gradle 用 debug keystore 签 release（已在项目里）
        working-directory: ${{ env.PROJECT_PATH }}
        run: flutter build apk --release

      - name: Rename APK
        run: |
          cp ${{ env.PROJECT_PATH }}/build/app/outputs/flutter-apk/app-release.apk \
             "$GITHUB_WORKSPACE/ole_flutter-android.apk"

      - uses: actions/upload-artifact@v4
        with:
          name: android
          path: ole_flutter-android.apk
          if-no-files-found: error
          retention-days: 7

  release:
    name: Publish Release
    needs: [windows, macos, android]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Resolve tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "name=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "name=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          fi

      - name: List artifacts
        run: ls -la dist/

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.name }}
          name: ${{ steps.tag.outputs.name }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: |
            dist/ole_flutter-windows-setup.exe
            dist/ole_flutter-macos.dmg
            dist/ole_flutter-android.apk
