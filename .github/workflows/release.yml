name: Build & Release

# 触发方式：
#   1. 推 tag (v*) - 自动构建三平台并发布到 Releases 页面
#   2. workflow_dispatch - 在 Actions 页手动跑，自己指定 tag
on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: '版本号（如 v0.1.0）'
        required: true
        default: 'v0.1.0'

permissions:
  contents: write

env:
  FLUTTER_VERSION: '3.27.2'
  PROJECT_PATH: 'ole_flutter'

jobs:
  windows:
    name: Build Windows
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Pub get
        working-directory: ${{ env.PROJECT_PATH }}
        run: flutter pub get

      - name: Build
        working-directory: ${{ env.PROJECT_PATH }}
        run: flutter build windows --release

      - name: Package zip
        shell: pwsh
        run: |
          $src = "${{ env.PROJECT_PATH }}\build\windows\x64\runner\Release"
          Compress-Archive -Path "$src\*" -DestinationPath "$env:GITHUB_WORKSPACE\ole_flutter-windows-x64.zip"

      - uses: actions/upload-artifact@v4
        with:
          name: windows
          path: ole_flutter-windows-x64.zip
          if-no-files-found: error
          retention-days: 7

  macos:
    name: Build macOS
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Pub get
        working-directory: ${{ env.PROJECT_PATH }}
        run: flutter pub get

      - name: Build
        working-directory: ${{ env.PROJECT_PATH }}
        run: flutter build macos --release

      - name: Package zip
        # ditto 是 macOS 官方推荐的 zip 工具，正确保留资源 fork 和符号链接
        working-directory: ${{ env.PROJECT_PATH }}/build/macos/Build/Products/Release
        run: |
          APP=$(ls -d *.app | head -1)
          ditto -c -k --sequesterRsrc --keepParent "$APP" "$GITHUB_WORKSPACE/ole_flutter-macos.zip"

      - uses: actions/upload-artifact@v4
        with:
          name: macos
          path: ole_flutter-macos.zip
          if-no-files-found: error
          retention-days: 7

  android:
    name: Build Android APK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Pub get
        working-directory: ${{ env.PROJECT_PATH }}
        run: flutter pub get

      - name: Build APK
        # 当前 android/app/build.gradle 用 debug keystore 签 release（已在项目里）
        working-directory: ${{ env.PROJECT_PATH }}
        run: flutter build apk --release

      - name: Rename APK
        run: |
          cp ${{ env.PROJECT_PATH }}/build/app/outputs/flutter-apk/app-release.apk \
             "$GITHUB_WORKSPACE/ole_flutter-android.apk"

      - uses: actions/upload-artifact@v4
        with:
          name: android
          path: ole_flutter-android.apk
          if-no-files-found: error
          retention-days: 7

  release:
    name: Publish Release
    needs: [windows, macos, android]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Resolve tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "name=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "name=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          fi

      - name: List artifacts
        run: ls -la dist/

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.name }}
          name: ${{ steps.tag.outputs.name }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: |
            dist/ole_flutter-windows-x64.zip
            dist/ole_flutter-macos.zip
            dist/ole_flutter-android.apk
