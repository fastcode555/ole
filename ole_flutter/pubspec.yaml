name: ole_flutter
description: "OLE 影视客户端 - Flutter 跨端版本"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.6.1

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  dio: ^5.7.0
  html: ^0.15.5
  go_router: ^14.6.2
  provider: ^6.1.2
  shared_preferences: ^2.3.3
  cached_network_image: ^3.4.1

  # media_kit_video 1.x 在 Flutter 3.27 Android engine 下编译报错（SurfaceProducer.Callback API 变化）
  # 2.0.x 修了这个问题。media_kit 主包仍走 1.2.x（pub 上无 2.x）。
  media_kit: ^1.2.6
  media_kit_video: ^2.0.1
  media_kit_libs_video: ^1.0.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.2

flutter:
  uses-material-design: true
  assets:
    - icon.png

flutter_launcher_icons:
  image_path: "icon.png"
  android: "ic_launcher"
  min_sdk_android: 24
  remove_alpha_ios: true
  windows:
    generate: true
    image_path: "icon.png"
    icon_size: 256
  macos:
    generate: true
    image_path: "icon.png"
